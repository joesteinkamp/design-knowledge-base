title: Design Knowledge Base
description: An open-source design documentation repository to provide a central location for design education.
baseurl: ""


# jekyll-seo-tag onward are GitHub Pages defaults, listed explicitly so local builds match production.
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-relative-links
  - jekyll-default-layout
  - jekyll-titles-from-headings

exclude:
  - PRODUCT.md
  - DESIGN.md
  - DESIGN.json
  - README.md
  - Gemfile
  - Gemfile.lock
  - "Design Knowledge Base Styles.sketch"
  - "Design Knowledge Base Styles.xd"